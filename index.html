<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pré-Consulta — Fernanda Bessa Dermatologia</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f0eeec;--surface:#ffffff;--gray-100:#f5f4f2;--gray-200:#e8e6e3;--gray-300:#d0cdc9;--gray-400:#b0acaa;--gray-500:#8a8580;--gray-700:#5a5652;--gray-900:#2e2c2a}html{scroll-behavior:smooth}body{background:var(--bg);font-family:'Raleway',sans-serif;font-weight:300;color:var(--gray-700);min-height:100vh;padding:60px 20px 100px}header{text-align:center;margin-bottom:56px}.brand-name{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,30px);font-weight:300;letter-spacing:.25em;color:var(--gray-900);text-transform:uppercase}.brand-sub{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--gray-400);margin-top:6px}.form-card{max-width:780px;margin:0 auto;background:var(--surface);border:1px solid var(--gray-200);padding:52px clamp(24px,5vw,64px)}.section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:.12em;color:var(--gray-900);text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--gray-200);margin-bottom:28px;margin-top:44px;display:flex;align-items:center;gap:12px}.section-num{font-size:11px;letter-spacing:.2em;color:var(--gray-400);font-family:'Raleway',sans-serif;font-weight:400}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px 28px}.col-span{grid-column:1/-1}@media(max-width:580px){.grid-2{grid-template-columns:1fr}.col-span{grid-column:1}}.field{display:flex;flex-direction:column;gap:7px}label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gray-500);font-weight:500}input[type=text],input[type=email],input[type=tel],input[type=date],select,textarea{background:var(--gray-100);border:1px solid transparent;border-bottom-color:var(--gray-300);padding:11px 14px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:300;color:var(--gray-900);outline:none;transition:border-color .25s,background .25s;width:100%;-webkit-appearance:none;appearance:none}input:focus,select:focus,textarea:focus{border-color:var(--gray-400);background:#fff}​​​​​​​​​​​​​​​​
